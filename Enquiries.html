        <h2><font color="#DB2131">INQUIRY FORM</font></h2>
        
        <form action="/submit-inquiry" method="post">
            <label for="name">Full Name:</label><br>
            <input type="text" id=" full-name" name="name"  placeholder="Enter your name" required><br><br>

            <label for="emal">Email:</label><br>

            <br><br>

            <select id="reason" name="reason">

                <option value="product">Product Information</option>
            </select>
            <br><br>

            <label for="message">Message</label><br>
            <textarea id="message" name="message" row="5" required placeholder="Tell us more about your inquiry..."></textarea>
            <br><br>
